<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anonymous Chat Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="ChatNewstyle.css">
</head>
<body class="bg-gradient">

<div class="container-fluid vh-100 d-flex">
  <!-- Sidebar -->
  <aside class="col-12 col-md-3 bg-dark text-white p-3 d-flex flex-column">
    <h3 class="text-center">Profile</h3>
    <div class="text-center mb-3">
      <img id="profile-img" src="default-avatar.png" class="rounded-circle border border-success" width="100" height="100" alt="Profile">
      <input type="file" id="profile-upload" accept="image/*" class="form-control mt-2">
      <button id="remove-profile" class="btn btn-danger btn-sm mt-2 d-none">❌ Remove Profile</button>
    </div>
    <div>
      <label class="form-label">Name:</label>
      <input type="text" id="edit-name" class="form-control mb-2" placeholder="Change your name">
      <button id="change-name" class="btn btn-primary w-100 mb-3">Change Name</button>

      <label class="form-label">Phone:</label>
      <input type="text" id="edit-phone" class="form-control mb-3" placeholder="Enter phone number">
    </div>
    <div class="text-center">
      <label for="bg-upload" class="btn btn-info w-100 mb-2">📷 Upload Background</label>
      <input type="file" id="bg-upload" accept="image/*" hidden>
      <button id="remove-bg" class="btn btn-danger w-100 d-none">❌ Remove Background</button>
    </div>
    <div id="user-info" class="fw-bold text-center mt-3"></div>
  </aside>
<div class="container-fluid vh-100 d-flex">
  <!-- Chat Area -->
  <main class="chatArea d-flex flex-column">
    <header class="bg-light p-3 rounded shadow-sm mb-2 text-center">
      <h2>Anonymous Chat Room</h2>
      <p class="small text-muted">Chat instantly without permanent history. Privacy protected.</p>
      <p class="small text-danger"><strong>Disclaimer:</strong> Chats, phone numbers, and IP addresses are not stored. Users are responsible for their interactions.</p>
    </header>

    <div id="chat" class="flex-grow-1 overflow-auto p-3 bg-white rounded shadow-sm mb-2"></div>
    <div id="typing" class="text-muted fst-italic small px-3"></div>

    <div class="input-group mb-3">
      <input type="text" id="message" class="form-control" placeholder="Type a message...">
      <button id="send" class="btn btn-success">Send</button>
    </div>
  </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="ChatNewScript.js"></script>
</body>
</html>
